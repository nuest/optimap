{% extends "main.html" %}

{% block alert %}
<div class="alert alert-{{ error.class }} m-3" role="alert">
  <button type="button" class="close" data-dismiss="alert" aria-label="Close">×</button>
  <strong>{{ error.title }}</strong> {{ error.text }}
</div>
{% endblock %}
